# apache-php/vhosts.conf

# 1. VirtualHost per il tuo sito PHP (apache.altalena.local)
<VirtualHost *:80>
    ServerName apache.altalena.local
    ServerAlias altalena.local
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>

# 2. VirtualHost per il Reverse Proxy di phpMyAdmin
<VirtualHost *:80>
    ServerName phpmyadmin.altalena.local

    # Proxy verso il container phpmyadmin usando il suo alias di rete interna
    ProxyPass / http://phpmyadmin.altalena.local/
    ProxyPassReverse / http://phpmyadmin.altalena.local/

    ErrorLog ${APACHE_LOG_DIR}/pma_error.log
    CustomLog ${APACHE_LOG_DIR}/pma_access.log combined
</VirtualHost>

